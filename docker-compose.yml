services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: merge-stars-backend
    ports:
      - '${BACKEND_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
    restart: always
    networks:
      - merge-stars

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_WS_URL: ${VITE_WS_URL:-}
    container_name: merge-stars-frontend
    ports:
      - '${FRONTEND_PORT:-8080}:80'
    depends_on:
      - backend
    restart: always
    networks:
      - merge-stars

networks:
  merge-stars:
    driver: bridge
