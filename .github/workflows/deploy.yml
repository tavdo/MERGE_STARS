name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check required secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          missing=0
          for name in VPS_HOST VPS_USER VPS_SSH_KEY; do
            eval "val=\$$name"
            if [ -z "$val" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "Add secrets: Repo → Settings → Secrets → Actions"
            echo "Guide: deploy/GITHUB-ACTIONS-SETUP.md"
            exit 1
          fi
          echo "Required secrets are set."

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 25m
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_DIR="${{ secrets.VPS_DEPLOY_PATH }}"
            if [ -z "$DEPLOY_DIR" ]; then
              DEPLOY_DIR="$HOME/MERGE_STARS"
            fi
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo "ERROR: $DEPLOY_DIR is not a git repo. Clone MERGE_STARS there first."
              echo "See deploy/GITHUB-ACTIONS-SETUP.md"
              exit 1
            fi
            cd "$DEPLOY_DIR"
            git fetch origin main
            git reset --hard origin/main
            sed -i 's/\r$//' deploy/*.sh
            chmod +x deploy/*.sh
            bash deploy/deploy.sh
            echo "Deployed commit: $(git log -1 --oneline)"
