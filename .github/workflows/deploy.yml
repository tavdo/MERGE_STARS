name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_DIR="${{ secrets.VPS_DEPLOY_PATH }}"
            if [ -z "$DEPLOY_DIR" ]; then
              DEPLOY_DIR="$HOME/MERGE_STARS"
            fi
            cd "$DEPLOY_DIR"
            git pull origin main
            chmod +x deploy/deploy.sh
            ./deploy/deploy.sh
